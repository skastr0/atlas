name: Publish npm plugins

on:
  workflow_dispatch:
  push:
    tags:
      - "plugins-v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-plugins-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install OpenCode plugin dependencies
        run: bun install --cwd apps/opencode-plugin --frozen-lockfile

      - name: Verify Codex plugin
        run: npm --prefix apps/codex-plugin test

      - name: Verify OpenCode plugin
        run: bun run --cwd apps/opencode-plugin verify

      - name: Publish packages
        shell: bash
        run: |
          set -euo pipefail

          publish_package() {
            local package_dir="$1"
            local manifest="${package_dir}/package.json"
            local name
            local version

            name="$(node -p "require('./${manifest}').name")"
            version="$(node -p "require('./${manifest}').version")"

            if npm view "${name}@${version}" version --prefer-online >/dev/null 2>&1; then
              echo "Skipping ${name}@${version}; already published."
            else
              npm publish "./${package_dir}" --access public
            fi
          }

          publish_package "apps/codex-plugin"
          publish_package "apps/opencode-plugin"
